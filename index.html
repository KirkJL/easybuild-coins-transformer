<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CSV TEST</title>
</head>
<body>

<h2>CSV TEST APP</h2>

<input type="file" id="fileInput">
<button onclick="run()">Convert</button>

<pre id="out"></pre>

<script>
console.log("SCRIPT RUNNING");

function run() {
  console.log("BUTTON CLICKED");

  const file = document.getElementById('fileInput').files[0];

  if (!file) {
    alert("NO FILE");
    return;
  }

  file.text().then(text => {
    console.log("FILE READ OK");

    document.getElementById('out').textContent = text.slice(0, 200);
  });
}
</script>

</body>
</html>
